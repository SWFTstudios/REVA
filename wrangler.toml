# SWFT REVA — Cloudflare Worker (dynamic site + API; deploy with wrangler, not static Pages)
name = "swft-reva"
main = "src/index.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"

# Optional custom domain — uncomment when ready
# routes = [
#   { pattern = "reva.swftstudios.com/*", custom_domain = true }
# ]

# D1 — database_id filled after: npx wrangler d1 create swft-reva-db
[[d1_databases]]
binding = "DB"
database_name = "swft-reva-db"
database_id = "a9bfce72-ca3d-4033-9a89-3f530aeda8ef"

# R2 — enable at dash.cloudflare.com → R2, then:
#   npx wrangler r2 bucket create swft-reva-uploads
# Uncomment below and redeploy:
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "swft-reva-uploads"

# Non-secret config — update APP_URL to your workers.dev URL after first deploy
[vars]
APP_URL = "https://swft-reva.elombe.workers.dev"
FROM_EMAIL = "elombe@swftstudios.com"
STRIPE_PRICE_QUICK_SETUP   = "price_1Tay5tAF4d9gCyuNjHypcIdY"
STRIPE_PRICE_QUICK_MONTHLY = "price_1Tay5wAF4d9gCyuNaATyeJaZ"
STRIPE_PRICE_PRO_SETUP     = "price_1Tay5zAF4d9gCyuNgdr5RHcV"
STRIPE_PRICE_PRO_MONTHLY   = "price_1Tay62AF4d9gCyuNzcP1nlfD"
STRIPE_PRICE_PORTFOLIO     = "price_1Tay64AF4d9gCyuNiYsUrlBZ"
AIRTABLE_BASE_ID = "appx3jGQIAp1lzwW0"
AIRTABLE_TABLE_INQUIRIES = "Inquiries"
AIRTABLE_TABLE_LISTINGS = "Listings"
AIRTABLE_VIEW_URL = "https://airtable.com/appx3jGQIAp1lzwW0/shroRmEse80QK8gKz"

# Secrets — npx wrangler secret put <NAME>
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, ANTHROPIC_API_KEY, ADMIN_EMAIL
#   RESEND_API_KEY (optional), AIRTABLE_API_KEY (optional)
